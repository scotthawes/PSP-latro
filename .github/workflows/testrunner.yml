name: Test Runner

on:
  workflow_dispatch:
    inputs:
      run_ppsspp:
        description: 'Run PPSSPP smoke tests in CI (best-effort)'
        required: false
        default: 'false'

jobs:
  smoke:
    if: ${{ github.event.inputs.run_ppsspp == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick x11-apps xwd python3 python3-pip || true
          pip3 install --user pillow || true
          # Try to install PPSSPP (may not be available in the distro)
          sudo apt-get install -y ppsspp || true

      - name: Build
        run: |
          chmod +x scripts/pspbuilder/build_with_docker.sh
          scripts/pspbuilder/build_with_docker.sh $GITHUB_WORKSPACE all || true

      - name: Run smoke test
        run: |
          chmod +x scripts/testrunner/*.sh
          scripts/testrunner/run_smoke_test.sh true || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testrunner-output
          path: test-output
